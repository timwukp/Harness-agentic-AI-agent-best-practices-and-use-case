name: UI Test Agent

on:
  pull_request:
    paths:
      - 'app/demo-frontend/**'
      - 'docs/demo/**'
      - '**/*.html'
      - '**/*.css'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to test'
        required: true
        default: 'https://timwukp.github.io/Harness-agentic-AI-agent-best-practices-and-use-case/demo/index.html'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install boto3 strands-agents strands-agents-tools playwright

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run UI Test Agent
        id: test
        run: |
          python -c "
          from strands import Agent
          from strands_tools.browser import AgentCoreBrowser

          agent = Agent(tools=[AgentCoreBrowser(region='us-east-1').browser])
          response = agent('''Test https://timwukp.github.io/Harness-agentic-AI-agent-best-practices-and-use-case/demo/index.html

          Test cases:
          1. Type wronguser/wrong, click Login - verify error says invalid credentials (not server error)
          2. Check error message color is RED (not green)
          3. Type admin/password123, click Login - verify success

          Report PASS/FAIL for each.''')
          print(response.message['content'][0]['text'])
          " | tee test-output.txt
        continue-on-error: true

      - name: Post results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('test-output.txt', 'utf8');
            const status = '${{ steps.test.outcome }}' === 'success' ? '✅' : '❌';
            const body = `## ${status} UI Test Agent Results\n\n\`\`\`\n${output.slice(-2000)}\n\`\`\`\n\n---\n*Powered by AgentCore UI Test Agent v0.2.0*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
